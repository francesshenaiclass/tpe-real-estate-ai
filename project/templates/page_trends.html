<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>市場漲幅分析 - 台北房產 AI 決策系統</title>
<link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
    /* 🚩 覆蓋與首頁同步的 Tiffany 綠配色變數 */
    :root {
        --bg-beige: #f8f6f2; 
        --line-color: #d1cfc9;
        --text-main: #231815;
        --teal-600: #0d9488;
        --teal-50: #f0fdfa;
        --rise-color: #0d9488; /* 上漲改用 Tiffany 綠 */
        --fall-color: #888;    /* 下跌改用灰色，展現高級感 */
    }

    body {
        background: var(--bg-beige);
        color: var(--text-main);
        font-family: 'Noto Sans TC', sans-serif;
    }

    /* 確保 navbar 高度不影響佈局 */
    .page-content { max-width: 1400px; margin: 0 auto; padding: 3rem 7%; }

    /* 頂部標題 */
    .trend-header { margin-bottom: 3rem; border-bottom: 1px solid var(--line-color); padding-bottom: 2rem; }
    .trend-header h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; }
    .trend-header h1 em { color: var(--teal-600); font-style: normal; }

    /* 狀態顯示 */
    .status-pill { display: inline-flex; align-items: center; gap: 8px; background: white; padding: 6px 15px; border-radius: 20px; font-size: 0.7rem; border: 1px solid var(--line-color); }
    .dot.live { width: 8px; height: 8px; border-radius: 50%; background: var(--teal-600); box-shadow: 0 0 8px var(--teal-600); }

    /* 排行榜卡片 */
    .rank-strip { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 40px; }
    .rank-card { background: white; border: 1px solid var(--line-color); padding: 20px; border-radius: 12px; transition: 0.3s; position: relative; }
    .rank-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
    .rank-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
    .rank-card.up::before { background: var(--teal-600); }
    .rank-card.down::before { background: var(--fall-color); }

    /* 熱力矩陣 */
    .heat-panel { background: white; border: 1px solid var(--line-color); border-radius: 12px; padding: 25px; overflow-x: auto; margin-bottom: 40px; }
    .heat-tbl { width: 100%; border-collapse: separate; border-spacing: 4px; }
    .heat-tbl td { text-align: center; padding: 12px 6px; border-radius: 6px; font-size: 0.8rem; min-width: 65px; border: 1px solid rgba(0,0,0,0.03); }
    .heat-tbl td.ln { text-align: left; font-weight: 700; min-width: 100px; border: none; }
    .selected-col { outline: 2px solid var(--teal-600); }

    /* 折線圖面板 */
    .line-panel { background: white; border: 1px solid var(--line-color); border-radius: 12px; padding: 30px; }

    /* 月份選擇器 */
    .mpill { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--line-color); background: white; color: #666; cursor: pointer; transition: 0.2s; font-size: 0.85rem; font-weight: bold; }
    .mpill.active { background: var(--teal-600); color: white; border-color: var(--teal-600); }
</style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">台北房產 AI</div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('portal') }}" class="nav-link">首頁</a></li>
                <li><a href="{{ url_for('get_architecture') }}" class="nav-link">系統架構圖</a></li>
                <li><a href="{{ url_for('get_predict') }}" class="nav-link">精準房價預估</a></li>
                <li><a href="{{ url_for('get_recommend') }}" class="nav-link">購屋預算推薦</a></li>
                <li><a href="{{ url_for('get_trends') }}" class="nav-link active">市場漲幅分析</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-content">
        <div class="trend-header">
            <div class="status-pill mb-4"><div id="dot" class="dot live"></div><span id="conn-lbl">API 已連線</span></div>
            <h1>房價<em>月增率</em>走勢</h1>
            <p style="color: #888;">根據 32 萬筆歷史成交資料，分析各行政區之市場波動與價格趨勢。</p>
        </div>

        <div id="loader" style="text-align: center; padding: 100px; color: var(--teal-600);">
            📡 正在同步資料庫分析模組...
        </div>

        <div id="main-content" style="display: none;">
            <div style="margin-bottom: 30px; display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 0.8rem; font-weight: 900; color: #aaa;">SELECT PERIOD</span>
                <div id="month-pills" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
            </div>

            <h3 class="fw-bold mb-4" style="font-size: 1.2rem;">🏆 漲幅排行榜 <span id="rank-month-tag" style="color: var(--teal-600);">---</span></h3>
            <div id="rank-strip" class="rank-strip"></div>

            <h3 class="fw-bold mb-4" style="font-size: 1.2rem;">🔥 區域熱力矩陣</h3>
            <div class="heat-panel">
                <table id="heat-tbl" class="heat-tbl"></table>
            </div>

            <h3 class="fw-bold mb-4" style="font-size: 1.2rem;">📈 12區走勢對比</h3>
            <div class="line-panel">
                <canvas id="lineChart" style="min-height: 450px;"></canvas>
            </div>
        </div>
    </div>

<script>
// 🚩 核心邏輯完全保留
const API_BASE = '/api/trends';
const DISTRICTS = ["中正區","大同區","中山區","松山區","大安區","萬華區","信義區","士林區","北投區","內湖區","南港區","文山區"];
const COLORS = ['#0d9488','#2563eb','#4b5563','#f59e0b','#ef4444','#8b5cf6','#ec4899','#10b981','#06b6d4','#6366f1','#f43f5e','#78350f'];

let allData = {}; 
let allMonths = [];
let selMonth = '';
let lineInst = null;

async function boot() {
    try {
        const res = await fetch(`${API_BASE}/monthly-growth`);
        const json = await res.json();
        allData = json.districts || {};
        const ms = new Set();
        Object.values(allData).forEach(rows => {
            if(Array.isArray(rows)) rows.forEach(r => ms.add(r.年月));
        });
        allMonths = [...ms].sort();
        selMonth = allMonths[allMonths.length - 1];
        document.getElementById('loader').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        renderAll();
    } catch (e) {
        document.getElementById('loader').innerHTML = `<b style="color:red">連線失敗</b><br>${e.message}`;
    }
}

function renderAll() {
    buildPills();
    buildRanking();
    buildHeatmap();
    buildLineChart();
}

function buildPills() {
    const wrap = document.getElementById('month-pills');
    wrap.innerHTML = allMonths.map(m => `<div class="mpill ${m===selMonth?'active':''}" onclick="pickMonth('${m}')">${m}</div>`).join('');
}

function pickMonth(m) {
    selMonth = m;
    document.querySelectorAll('.mpill').forEach(el => el.classList.toggle('active', el.innerText.trim() === m));
    buildRanking();
    document.querySelectorAll('#heat-tbl td').forEach(td => td.classList.toggle('selected-col', td.getAttribute('data-month') === m));
}

function buildRanking() {
    document.getElementById('rank-month-tag').innerText = selMonth;
    const items = DISTRICTS.map(d => {
        const row = (allData[d] || []).find(x => x.年月 === selMonth);
        return { name: d, rate: row ? row.月增率 : null, price: row ? row.均總價 : 0 };
    }).filter(x => x.rate !== null).sort((a, b) => b.rate - a.rate);

    document.getElementById('rank-strip').innerHTML = items.map((item, i) => {
        const cls = item.rate > 0 ? 'up' : 'down';
        return `<div class="rank-card ${cls}">
            <div style="font-size:0.75rem; color:#aaa; font-weight:900;">#${i+1}</div>
            <div style="font-weight:900; font-size:1.1rem; margin-top:5px;">${item.name}</div>
            <div style="color:#888; font-size:0.7rem;">均價 ${Math.round(item.price).toLocaleString()} 萬</div>
            <div style="font-weight:900; color:${item.rate>0?'var(--teal-600)':'#888'}; margin-top:10px;">
                ${item.rate > 0 ? '+' : ''}${item.rate.toFixed(1)}%
            </div>
        </div>`;
    }).join('');
}

function buildHeatmap() {
    const table = document.getElementById('heat-tbl');
    let html = '<thead><tr><th class="ln">行政區</th>';
    allMonths.forEach(m => html += `<th style="font-size:0.6rem; color:#aaa;">${m.slice(5)}月</th>`);
    html += '</tr></thead><tbody>';
    DISTRICTS.forEach(d => {
        html += `<tr><td class="ln">${d}</td>`;
        allMonths.forEach(m => {
            const row = (allData[d] || []).find(x => x.年月 === m);
            const val = row ? row.月增率 : null;
            const t = Math.max(0, Math.min(1, (val + 8) / 18));
            // 🚩 修改熱力顏色：上漲時顏色為 Tiffany 綠的深淺
            const color = val === null ? 'transparent' : `rgba(13, 148, 136, ${t})`;
            const sel = m === selMonth ? 'selected-col' : '';
            html += `<td class="${sel}" data-month="${m}" style="background:${color}; font-weight:bold; color:${val > 4 ? '#fff' : 'var(--text-main)'}">
                ${val ? (val>0?'+':'')+val.toFixed(1) : '---'}
            </td>`;
        });
        html += '</tr>';
    });
    table.innerHTML = html + '</tbody>';
}

function buildLineChart() {
    const ctx = document.getElementById('lineChart').getContext('2d');
    if (lineInst) lineInst.destroy();
    const datasets = DISTRICTS.filter(d => allData[d]).map((d, i) => ({
        label: d,
        data: allMonths.map(m => {
            const r = (allData[d] || []).find(x => x.年月 === m);
            return r ? r.月增率 : null;
        }),
        borderColor: COLORS[i % COLORS.length],
        borderWidth: 3,
        tension: 0.4,
        pointRadius: 0,
        spanGaps: true
    }));
    lineInst = new Chart(ctx, {
        type: 'line',
        data: { labels: allMonths, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { padding: 20, font: { size: 10, weight: 'bold' } } }
            },
            scales: {
                x: { grid: { display: false } },
                y: { ticks: { callback: v => v + '%' } }
            }
        }
    });
}
boot();
</script>
</body>
</html>
