<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精準房價預估 - 台北房產 AI 決策系統</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --teal-600: #0d9488;
            --teal-50: #f0fdfa;
        }
        body { display: flex; flex-direction: column; height: 100vh; margin: 0; background-color: var(--teal-50); }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* 地圖區 */
        #map { flex: 1; border-right: 1px solid var(--gray-200); position: relative; z-index: 1; }
        
        /* 右側面板 */
        #panel { 
            width: 480px; 
            padding: 2rem; 
            overflow-y: auto; 
            background: white; 
            box-shadow: -4px 0 20px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .input-card { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 0.75rem; padding: 1.5rem; }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .grid-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
        
        /* 數值高亮 */
        .result-highlight { border: 2px solid var(--teal-600) !important; background: var(--teal-50) !important; }
        .price-value-big { font-size: 1.75rem; font-weight: 800; color: var(--teal-600); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">台北房產 AI</div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('portal') }}" class="nav-link">首頁</a></li>
                <li><a href="{{ url_for('get_architecture') }}" class="nav-link">系統架構圖</a></li>
                <li><a href="{{ url_for('get_predict') }}" class="nav-link active">精準房價預估</a></li>
                <li><a href="{{ url_for('get_recommend') }}" class="nav-link">購屋預算推薦</a></li>
                <li><a href="{{ url_for('get_trends') }}" class="nav-link">市場漲幅分析</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-container">
        <div id="map"></div>

        <div id="panel">
            <h1 style="font-size: 1.8rem; font-weight: 800; color: var(--teal-600); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                <span>🏢</span> 精準房價預估
            </h1>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 1.5rem;">請在地圖點擊房屋位置或輸入基本資訊</p>

            <div class="input-card">
                <div class="form-group">
                    <label class="form-label">📍 行政區定位</label>
                    <select id="district" class="form-select">
                        <option value="">選擇行政區或直接在地圖點擊</option>
                        <option value="中山區">中山區</option><option value="中正區">中正區</option><option value="信義區">信義區</option>
                        <option value="內湖區">內湖區</option><option value="北投區">北投區</option><option value="南港區">南港區</option>
                        <option value="士林區">士林區</option><option value="大同區">大同區</option><option value="大安區">大安區</option>
                        <option value="文山區">文山區</option><option value="松山區">松山區</option><option value="萬華區">萬華區</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">🏠 房屋類型</label>
                    <select id="house_type" class="form-select">
                        <option value="大樓">大樓</option><option value="公寓">公寓</option>
                        <option value="華廈">華廈</option><option value="透天">透天厝</option><option value="套房">套房</option>
                    </select>
                </div>

                <div class="grid-row">
                    <div class="form-group">
                        <label class="form-label">📏 建物坪數</label>
                        <input type="number" id="area" class="form-input" value="25.5">
                    </div>
                    <div class="form-group">
                        <label class="form-label">⏳ 屋齡 (年)</label>
                        <input type="number" id="age" class="form-input" value="15">
                    </div>
                </div>

                <div class="grid-row">
                    <div class="form-group">
                        <label class="form-label">🏢 所在樓層</label>
                        <input type="number" id="start_floor" class="form-input" value="5">
                    </div>
                    <div class="form-group">
                        <label class="form-label">🔝 總樓層數</label>
                        <input type="number" id="total_floors" class="form-input" value="12">
                    </div>
                </div>

                <div class="grid-row-3">
                    <div class="form-group">
                        <label class="form-label">房</label>
                        <input type="number" id="rooms" class="form-input" value="2">
                    </div>
                    <div class="form-group">
                        <label class="form-label">廳</label>
                        <input type="number" id="halls" class="form-input" value="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">衛</label>
                        <input type="number" id="bathrooms" class="form-input" value="1">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">🔍 選定座標 (經緯度)</label>
                    <input type="text" id="coords" class="form-input" readonly style="background-color: #eee; color: #666;">
                </div>

                <button id="predictBtn" onclick="runPrediction()" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem;">
                    開始深度預估
                </button>
            </div>

            <div id="resultCard" class="result-card" style="display: none; margin-top: 2rem;">
                <h2 style="font-size: 1.3rem; font-weight: 700; color: var(--gray-900); margin-bottom: 1.5rem;">分析結果</h2>
                
                <div class="result-item">
                    <p class="result-label">市場開價預估</p>
                    <p class="result-value" id="res_list" style="font-size: 1.5rem; color: #d9534f;">-</p>
                    <p class="result-unit">萬元</p>
                </div>

                <div class="result-item result-highlight">
                    <p class="result-label">合理成交中位數</p>
                    <p class="price-value-big" id="res_mid">-</p>
                    <p class="result-unit">萬元</p>
                </div>

                <div class="grid-row">
                    <div class="result-item">
                        <p class="result-label">合理低標</p>
                        <p id="res_low" style="font-weight: bold; color: #666;">-</p>
                    </div>
                    <div class="result-item">
                        <p class="result-label">合理高標</p>
                        <p id="res_high" style="font-weight: bold; color: #666;">-</p>
                    </div>
                </div>

                <div style="background: #fff8e1; border: 1px solid #ffe082; border-radius: 0.5rem; padding: 1rem; margin-top: 1rem;">
                    <p style="color: #856404; font-size: 0.85rem; font-weight: bold;">
                        💡 建議議價空間：<span id="res_gap">-</span>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 🚩 初始化地圖與邏輯 (完全保留第一版的功能)
        const map = L.map('map').setView([25.046, 121.517], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let marker, circle, selectedLat, selectedLon, mrtStations = [], isAuto = false;

        const centers = {
            "中山區": [25.0685, 121.5333], "中正區": [25.0322, 121.5185], "信義區": [25.0330, 121.5670],
            "內湖區": [25.0697, 121.5886], "北投區": [25.1321, 121.4987], 
            "南港區": [25.052, 121.606], 
            "士林區": [25.0901, 121.5245], "大同區": [25.0633, 121.5133], "大安區": [25.0340, 121.5435],
            "文山區": [24.9892, 121.5585], "松山區": [25.0592, 121.5592], "萬華區": [25.0354, 121.5032]
        };

        function updateMarker(lat, lon, msg, isValid = true) {
            if (marker) map.removeLayer(marker);
            if (circle) map.removeLayer(circle);
            marker = L.marker([lat, lon]).addTo(map).bindPopup(msg).openPopup();
            circle = L.circle([lat, lon], {
                color: isValid ? '#0d9488' : '#ff0000',
                fillOpacity: 0.1, radius: 500
            }).addTo(map);
            document.getElementById('coords').value = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
        }

        document.getElementById('district').addEventListener('change', (e) => {
            const c = centers[e.target.value];
            if (c) {
                selectedLat = c[0]; selectedLon = c[1];
                map.flyTo(c, 15);
                updateMarker(c[0], c[1], `<b>已定位：${e.target.value}</b>`);
            }
        });

        map.on('click', async (e) => {
            selectedLat = e.latlng.lat; selectedLon = e.latlng.lng;
            updateMarker(selectedLat, selectedLon, "座標識別中...");
            try {
                const res = await fetch(`/api/recommender/detect_district?lat=${selectedLat}&lon=${selectedLon}`);
                const data = await res.json();
                if (data.district && data.district !== "未知區域") {
                    document.getElementById('district').value = data.district;
                    updateMarker(selectedLat, selectedLon, `<b>識別區域：${data.district}</b>`);
                }
            } catch (err) {}
        });

        // 串接 API 預測邏輯
        async function runPrediction() {
            const btn = document.getElementById('predictBtn');
            const district = document.getElementById('district').value;
            if (!selectedLat || !district) return alert("請先在地圖選擇位置");

            const payload = {
                district,
                building_area: parseFloat(document.getElementById('area').value),
                house_age: parseFloat(document.getElementById('age').value),
                start_floor: parseInt(document.getElementById('start_floor').value),
                total_floors: parseInt(document.getElementById('total_floors').value),
                rooms: parseInt(document.getElementById('rooms').value),
                halls: parseInt(document.getElementById('halls').value),
                bathrooms: parseInt(document.getElementById('bathrooms').value),
                latitude: selectedLat, longitude: selectedLon,
                house_type: document.getElementById('house_type').value,
                distance_to_mrt: 500 // 後端會重算，先給預設值
            };

            try {
                btn.disabled = true; btn.innerText = "計算中...";
                const res = await fetch('/api/predict/v3', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('res_list').innerText = Math.round(data.listing_analysis.accurate_listing_price).toLocaleString();
                document.getElementById('res_mid').innerText = Math.round(data.real_price_reference.mid_p50).toLocaleString();
                document.getElementById('res_low').innerText = Math.round(data.real_price_reference.low_p10).toLocaleString();
                document.getElementById('res_high').innerText = Math.round(data.real_price_reference.high_p90).toLocaleString();
                document.getElementById('res_gap').innerText = data.insight.suggested_bargain_percent + "%";
            } catch (err) {
                alert("伺服器連線異常");
            } finally {
                btn.disabled = false; btn.innerText = "開始深度預估";
            }
        }
    </script>
</body>
</html>
