<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北房產大數據決策系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #13151c;
            --sidebar-hover: #1c1f2b;
            --accent-blue: #2563eb;
            --text-dim: #94a3b8;
        }

        body { display: flex; height: 100vh; overflow: hidden; margin: 0; background: #0b0c10; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        
        /* 側邊欄樣式 */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid #252836; display: flex; flex-direction: column; padding: 30px 20px; transition: 0.3s; }
        .sidebar-header { margin-bottom: 50px; text-align: center; }
        .sidebar-header h3 { color: #f0c040; font-size: 1.5rem; letter-spacing: 2px; }

        /* 導覽按鈕 */
        .nav-link { 
            color: var(--text-dim); padding: 16px 20px; border-radius: 12px; margin-bottom: 12px; 
            cursor: pointer; border: none; background: none; text-align: left; width: 100%; 
            transition: all 0.3s ease; display: flex; align-items: center; font-size: 1rem;
        }
        .nav-link i { width: 24px; font-size: 1.2rem; }
        .nav-link:hover { background: var(--sidebar-hover); color: white; transform: translateX(5px); }
        .nav-link.active { background: var(--accent-blue); color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }

        /* 主內容區 (Iframe) */
        .content-container { flex: 1; position: relative; background: #fff; }
        .content-frame { width: 100%; height: 100%; border: none; }
        
        /* 頁尾資訊 */
        .sidebar-footer { margin-top: auto; font-size: 0.75rem; color: #444968; text-align: center; border-top: 1px solid #252836; pt-3; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h3><i class="fa-solid fa-city me-2"></i>台北房產 AI</h3>
    </div>
    
    <div class="nav flex-column">
        <button class="nav-link active" onclick="loadPage('/pages/predict', this)">
            <i class="fa-solid fa-wand-magic-sparkles me-3"></i> 精準房價預估
        </button>
        
        <button class="nav-link" onclick="loadPage('/pages/recommend', this)">
            <i class="fa-solid fa-map-location-dot me-3"></i> 購屋預算推薦
        </button>
        
        <button class="nav-link" onclick="loadPage('/pages/trends', this)">
            <i class="fa-solid fa-chart-line me-3"></i> 市場漲幅分析
        </button>
    </div>

    <div class="sidebar-footer pt-3">
        <p>© 2026 Big Data Project<br>AI Talent Development Class</p>
    </div>
</div>

<div class="content-container">
    <iframe id="mainFrame" class="content-frame" src="/pages/predict"></iframe>
</div>

<script>
    /**
     * 切換頁面功能
     * @param {string} url - 內部路由地址
     * @param {HTMLElement} el - 點擊的按鈕元素
     */
    function loadPage(url, el) {
        const frame = document.getElementById('mainFrame');
        
        // 1. 切換 Iframe 內容
        frame.src = url;
        
        // 2. 切換按鈕樣式
        document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');

        // 3. 輸出除錯資訊 (開發時可用)
        console.log("🌐 載入頁面:", url);
    }
</script>
</body>
</html>
