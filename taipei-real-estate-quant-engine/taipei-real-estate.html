<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台北市房產預估 AI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; display: flex; height: 100vh; margin: 0; background: #f4f4f4; }
        #map { flex: 1; border-right: 2px solid #ccc; }
        #panel { width: 450px; padding: 20px; overflow-y: auto; background: white; box-shadow: -2px 0 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; transition: border 0.3s; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; font-weight: bold;}
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result-card { margin-top: 25px; padding: 15px; border: 1px solid #007bff; border-radius: 8px; background: #eef6ff; display: none; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .price-val { font-weight: bold; color: #d9534f; }
        .price-mid { font-weight: bold; color: #28a745; font-size: 18px; }
    </style>
</head>
<body>
<div id="map"></div>
<div id="panel">
    <h2>房產 AI 估價系統</h2>
    <div class="input-group">
        <label>行政區定位</label>
        <select id="district">
            <option value="">選擇行政區或直接在地圖上點擊</option>
            <option value="中山區">中山區</option><option value="中正區">中正區</option><option value="信義區">信義區</option>
            <option value="內湖區">內湖區</option><option value="北投區">北投區</option><option value="南港區">南港區</option>
            <option value="士林區">士林區</option><option value="大同區">大同區</option><option value="大安區">大安區</option>
            <option value="文山區">文山區</option><option value="松山區">松山區</option><option value="萬華區">萬華區</option>
        </select>
    </div>
    
    <div class="input-group">
        <label>房屋類型</label>
        <select id="house_type">
            <option value="大樓">大樓</option>
            <option value="公寓">公寓</option>
            <option value="華廈">華廈</option>
            <option value="透天">透天厝</option>
            <option value="套房">套房</option>
        </select>
    </div>
    
    <div style="display:flex; gap:10px;">
        <div class="input-group" style="flex:1;"><label>建物坪數</label><input type="number" id="area" value="25.5" min="1"></div>
        <div class="input-group" style="flex:1;"><label>屋齡 (年)</label><input type="number" id="age" value="15" min="0"></div>
    </div>
    <div style="display:flex; gap:10px;">
        <div class="input-group" style="flex:1;"><label>所在樓層</label><input type="number" id="start_floor" value="5"></div>
        <div class="input-group" style="flex:1;"><label>總樓層數</label><input type="number" id="total_floors" value="12"></div>
    </div>
    <div style="display:flex; gap:10px;">
        <div class="input-group" style="flex:1;"><label>房</label><input type="number" id="rooms" value="2" min="0"></div>
        <div class="input-group" style="flex:1;"><label>廳</label><input type="number" id="halls" value="1" min="0"></div>
        <div class="input-group" style="flex:1;"><label>衛</label><input type="number" id="bathrooms" value="1" min="0"></div>
    </div>
    <div class="input-group">
        <label>選定座標 (經緯度)</label>
        <input type="text" id="coords" readonly placeholder="請在地圖上點擊選取位置">
    </div>
    
    <button id="predictBtn" onclick="runPrediction()">執行 AI 深度估價</button>
    
    <div id="resultCard" class="result-card">
        <h3 style="margin-top: 0; color: #0056b3;">分析結果</h3>
        <div class="price-row"><span>市場開價預估</span><span class="price-val" id="res_list"></span></div>
        <div class="price-row"><span>合理成交中位數</span><span class="price-mid" id="res_mid"></span></div>
        <div class="price-row"><span>合理低標</span><span class="price-val" id="res_low" style="color:#666;"></span></div>
        <div class="price-row"><span>合理高標</span><span class="price-val" id="res_high" style="color:#666;"></span></div>
        <div class="price-row"><span>建議議價空間</span><span class="price-val" id="res_gap" style="color:#e67e22;"></span></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([25.046, 121.517], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marker, circle, selectedLat, selectedLon, mrtStations = [], isAuto = false;

    // 保留你原本手動校正過的地標座標
    const centers = {
        "中山區": [25.0685, 121.5333], "中正區": [25.0322, 121.5185], "信義區": [25.0330, 121.5670],
        "內湖區": [25.0697, 121.5886], "北投區": [25.1321, 121.4987], 
        "南港區": [25.052, 121.606], // 🚨 已經將南港區座標往下移，避開內湖重疊區
        "士林區": [25.0901, 121.5245], "大同區": [25.0633, 121.5133], "大安區": [25.0340, 121.5435],
        "文山區": [24.9892, 121.5585], "松山區": [25.0592, 121.5592], "萬華區": [25.0354, 121.5032]
    };

    // 畫圈與大頭針的核心邏輯，加入紅/藍色視覺區分
    function updateMarker(lat, lon, msg, isValid = true) {
        if (marker) map.removeLayer(marker);
        if (circle) map.removeLayer(circle);
        
        marker = L.marker([lat, lon]).addTo(map).bindPopup(msg).openPopup();
        
        if (isValid) {
            circle = L.circle([lat, lon], {
                color: '#007bff', fillColor: '#007bff', fillOpacity: 0.15, radius: 500
            }).addTo(map);
        } else {
            // 未知區域畫紅圈警告
            circle = L.circle([lat, lon], {
                color: '#ff0000', fillColor: '#ff0000', fillOpacity: 0.2, radius: 500
            }).addTo(map);
        }
        
        document.getElementById('coords').value = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
    }

    document.getElementById('district').addEventListener('change', (e) => {
        if (isAuto) return;
        const c = centers[e.target.value];
        if (c) {
            isAuto = true;
            selectedLat = c[0]; selectedLon = c[1];
            map.flyTo(c, 15);
            updateMarker(c[0], c[1], `<b>已定位至：${e.target.value}</b><br><span style="font-size: 12px; color: #666; display: inline-block; margin-top: 5px;">📍 請在地圖上點擊你想看的精確地點</span>`, true);
            document.getElementById('predictBtn').disabled = false; // 解除按鈕鎖定
            setTimeout(() => isAuto = false, 500);
        }
    });

    map.on('click', async (e) => {
        if (isAuto) return;
        isAuto = true;
        selectedLat = e.latlng.lat; selectedLon = e.latlng.lng;
        
        // 先預設畫藍圈，等 API 判定
        updateMarker(selectedLat, selectedLon, "座標識別中...", true);
        
        try {
            const res = await fetch(`http://127.0.0.1:8000/api/detect_district?lat=${selectedLat}&lon=${selectedLon}`);
            const data = await res.json();
            
            if (data.district && data.district !== "未知區域") {
                document.getElementById('district').value = data.district;
                updateMarker(selectedLat, selectedLon, `<b>識別區域：${data.district}</b>`, true);
                document.getElementById('predictBtn').disabled = false; // 開放估價
            } else {
                // 強制清空下拉選單，拔掉幽靈選項
                document.getElementById('district').value = ""; 
                updateMarker(selectedLat, selectedLon, `<b>❌ 警告：此處超出圖資範圍，拒絕估價</b>`, false);
                document.getElementById('predictBtn').disabled = true; // 強制鎖死按鈕
            }
        } catch (err) { console.error("API 連線失敗", err); }
        isAuto = false;
    });

    async function initMrt() {
        try {
            const res = await fetch('http://127.0.0.1:8000/api/mrt_data');
            const data = await res.json();
            mrtStations = Array.isArray(data) ? data : (data.stations || []);
        } catch (err) { console.error("無法載入捷運站資料", err); }
    }
    initMrt();

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function runPrediction() {
        const btn = document.getElementById('predictBtn');
        const district = document.getElementById('district').value;
        
        if (!selectedLat || !district) return alert("❌ 錯誤：請先在地圖上點擊選擇具體房屋位置");
        
        const startFloor = parseInt(document.getElementById('start_floor').value) || 1;
        const totalFloors = parseInt(document.getElementById('total_floors').value) || 1;
        
        if (startFloor > totalFloors) {
            document.getElementById('start_floor').style.border = "2px solid red";
            document.getElementById('total_floors').style.border = "2px solid red";
            return alert(`❌ 樓層輸入錯誤！\n「所在樓層 (${startFloor})」不能大於「總樓層數 (${totalFloors})」`);
        } else {
            document.getElementById('start_floor').style.border = "1px solid #ddd";
            document.getElementById('total_floors').style.border = "1px solid #ddd";
        }

        let minDist = Infinity;
        let closestStation = "";
        mrtStations.forEach(s => {
            const sLat = s.lat || s.緯度;
            const sLon = s.lon || s.經度;
            let d = calcDist(selectedLat, selectedLon, sLat, sLon);
            if (d < minDist) {
                minDist = d;
                closestStation = s.name || s.站名 || s.station_name || "未知";
            }
        });

        if (minDist === Infinity) minDist = 5;

        const payload = {
            district: district,
            mrt_station: closestStation, 
            building_area: parseFloat(document.getElementById('area').value) || 0,
            house_age: parseFloat(document.getElementById('age').value) || 0,
            start_floor: startFloor,
            total_floors: totalFloors,
            rooms: parseInt(document.getElementById('rooms').value) || 0,
            halls: parseInt(document.getElementById('halls').value) || 0,
            bathrooms: parseInt(document.getElementById('bathrooms').value) || 0,
            latitude: selectedLat, 
            longitude: selectedLon,
            house_type: document.getElementById('house_type').value,
            distance_to_mrt: minDist * 1000 
        };

        try {
            btn.disabled = true;
            btn.innerText = "計算中...";
            
            const res = await fetch('http://127.0.0.1:8000/api/v3/predict', {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            if (!res.ok) {
                const err = await res.json();
                return alert("預測失敗: " + err.detail);
            }
            
            const data = await res.json();
            
            document.getElementById('resultCard').style.display = 'block';
            
            const listData = data.listing_analysis;
            const realData = data.real_price_reference;
            const insight = data.insight;
            
            document.getElementById('res_list').innerText = Math.round(listData.accurate_listing_price).toLocaleString() + " 萬";
            document.getElementById('res_mid').innerText = Math.round(realData.mid_p50).toLocaleString() + " 萬";
            document.getElementById('res_low').innerText = Math.round(realData.low_p10).toLocaleString() + " 萬";
            document.getElementById('res_high').innerText = Math.round(realData.high_p90).toLocaleString() + " 萬";
            document.getElementById('res_gap').innerText = insight.suggested_bargain_percent + "%";

        } catch (err) {
            console.error(err);
            alert("伺服器連線異常，請確保 FastAPI 已啟動。");
        } finally {
            btn.disabled = false;
            btn.innerText = "執行 AI 深度估價";
        }
    }
</script>
</body>
</html>
